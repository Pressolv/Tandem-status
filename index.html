<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DAS Tandem M/E Status</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f0ec}
.app{max-width:440px;margin:0 auto;background:#fff;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:#1a2332;color:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-t{font-size:13px;font-weight:700}
.hdr-s{font-size:9px;color:rgba(255,255,255,.4)}
.hdr-clk{font-size:11px;color:rgba(255,255,255,.75);font-variant-numeric:tabular-nums}
.srow{display:flex;border-bottom:1px solid #eee;flex-shrink:0}
.sb{flex:1;padding:6px 2px;border:none;background:transparent;font-size:10px;font-weight:700;color:#ccc;cursor:pointer;border-bottom:2px solid transparent}
.sb.on{color:#1a2332;border-bottom-color:#1a2332}
.sdt{font-size:9px;color:#ccc;padding:6px 8px;display:flex;align-items:center;flex-shrink:0}
.sts{display:grid;grid-template-columns:repeat(4,1fr);flex-shrink:0}
.si{padding:7px 4px;text-align:center;border-right:1px solid #f3f3f3;border-bottom:1px solid #f3f3f3}
.si:last-child{border-right:none}
.sl{font-size:8px;color:#aaa;text-transform:uppercase;letter-spacing:.04em}
.sv{font-size:17px;font-weight:800;line-height:1.3}
.cr{color:#1D9E75}.cs{color:#b0b0b0}.cm{color:#d4880a}.cu{color:#2471b5}
.pb{height:3px;background:#f0f0f0;flex-shrink:0}
.pf{height:100%;background:#1D9E75;transition:width .4s}
.board{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.lhdr{padding:5px 10px;font-size:9px;font-weight:700;color:#bbb;letter-spacing:.08em;text-transform:uppercase;background:#fafaf8;border-top:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between}
.lsub{font-size:9px;color:#ddd;font-weight:500;text-transform:none;letter-spacing:0}
.gr{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:5px 6px 4px}
.cd{border:1.5px solid #e5e5e5;border-radius:6px;padding:5px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;min-height:46px;justify-content:center;background:#fff;transition:all .12s;-webkit-user-select:none;user-select:none;touch-action:manipulation}
.cd:active{transform:scale(.92)}
.cd.run{border-color:#1D9E75;background:#f0faf5}
.cd.stop{border-color:#e5e5e5;background:#fff}
.cd.maint{border-color:#d4880a;background:#fdf6e8}
.dd{width:6px;height:6px;border-radius:50%;background:#ddd}
.cd.run .dd{background:#1D9E75}.cd.maint .dd{background:#d4880a}
.cn{font-size:11px;font-weight:800;color:#555;line-height:1}
.cd.run .cn{color:#0d6640}.cd.maint .cn{color:#8a5200}
.ct{font-size:8px;color:#ccc;line-height:1}
.cd.run .ct{color:#6cc5a0}.cd.maint .ct{color:#d4880a}
.ftr{display:flex;gap:4px;padding:6px 8px;border-top:1px solid #eee;flex-shrink:0;background:#fafaf8}
.fb{flex:1;padding:8px 4px;border-radius:7px;border:1px solid #e5e5e5;background:#fff;font-size:10px;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;font-weight:700;touch-action:manipulation}
.fb:active{background:#f0f0f0}
.fb.lock{border-color:#fcc;background:#fff6f6;color:#c44}
.lgd{display:flex;gap:10px;padding:4px 10px;align-items:center;border-top:1px solid #f0f0f0;flex-shrink:0;background:#fafaf8}
.lgi{display:flex;align-items:center;gap:3px;font-size:9px;color:#aaa}
.lgd-dot{width:6px;height:6px;border-radius:50%}
.lgd-r{margin-left:auto;font-size:9px;color:#ddd}
.sync{font-size:9px;color:#1D9E75;padding:3px 10px;text-align:center;background:#f0faf5;border-bottom:1px solid #e8f5ee;flex-shrink:0;display:none}
.sync.show{display:block}
.sync.err{color:#c44;background:#fff6f6;border-color:#fcc}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.sh{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:440px;padding:0 14px 32px;animation:up .2s ease;max-height:88vh;overflow-y:auto}
@keyframes up{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.drg{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:12px auto 14px}
.mbg{display:inline-flex;font-size:10px;font-weight:700;padding:3px 9px;border-radius:14px;margin-bottom:6px}
.mbr{background:#e8f8f0;color:#1D9E75}.mbs{background:#f0f0f0;color:#888}.mbm{background:#fdf1dc;color:#d4880a}
.mti{font-size:17px;font-weight:800;color:#111;margin-bottom:1px}
.msu{font-size:11px;color:#bbb;margin-bottom:14px}
.mlbl{font-size:9px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.mbtn3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.mb{padding:11px 4px;border-radius:10px;border:1.5px solid #ebebeb;background:#fafafa;font-size:11px;font-weight:700;cursor:pointer;color:#bbb;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .12s;touch-action:manipulation}
.mb svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none}
.mb:active{transform:scale(.94)}
.mb.xrun{border-color:#1D9E75;background:#edfaf4;color:#0d6640}
.mb.xstop{border-color:#999;background:#f5f5f5;color:#444}
.mb.xmaint{border-color:#d4880a;background:#fdf1dc;color:#8a5200}
.qr{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.qc{padding:4px 9px;border-radius:14px;border:1px solid #ebebeb;background:#fafafa;font-size:10px;color:#777;cursor:pointer;transition:all .12s;touch-action:manipulation}
.qc:active{background:#eee}
.qc.pk{border-color:#1a2332;background:#1a2332;color:#fff}
.ni{width:100%;border:1.5px solid #ebebeb;border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;background:#fafafa;color:#222;resize:none;outline:none;-webkit-appearance:none;margin-bottom:10px}
.ni:focus{border-color:#888;background:#fff}
.mac{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px}
.mok{padding:13px;border-radius:10px;border:none;background:#1a2332;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.mok:active{background:#2c3a50}
.mcc{padding:13px;border-radius:10px;border:1.5px solid #ebebeb;background:#fafafa;color:#aaa;font-size:13px;font-weight:600;cursor:pointer}
.pw-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center}
.pw-ov.open{display:flex}
.pw-box{background:#fff;border-radius:14px;padding:24px 20px;width:300px;text-align:center;animation:up .2s ease}
.pw-title{font-size:15px;font-weight:700;margin-bottom:4px}
.pw-sub{font-size:11px;color:#aaa;margin-bottom:16px}
.pw-input{width:100%;border:1.5px solid #ebebeb;border-radius:8px;padding:12px;font-size:16px;text-align:center;letter-spacing:.15em;outline:none;-webkit-appearance:none}
.pw-input:focus{border-color:#1a2332}
.pw-err{font-size:11px;color:#c44;margin-top:6px;display:none}
.pw-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.pw-ok{padding:12px;border-radius:8px;border:none;background:#1a2332;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.pw-cc{padding:12px;border-radius:8px;border:1.5px solid #ebebeb;background:#fafafa;color:#aaa;font-size:13px;cursor:pointer}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a2332;color:#fff;font-size:12px;padding:8px 18px;border-radius:20px;pointer-events:none;z-index:300;white-space:nowrap;opacity:0;transition:opacity .25s}
.toast.on{opacity:1}
.ci{font-size:7px;color:#999;line-height:1.2;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 1px}
.cd.run .ci{color:#0d6640}
.cd.maint .ci{color:#8a5200;font-weight:700}
.rview{background:#fdf6e8;border:1.5px solid #f3ddae;border-radius:8px;padding:8px 10px;font-size:12px;color:#8a5200;margin-bottom:10px;white-space:pre-wrap;line-height:1.4}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-l"><div class="dot"></div><div><div class="hdr-t">DAS Tandem M/E Status</div><div class="hdr-s">IDAS Chennai &middot; 32 Presses</div></div></div>
    <div class="hdr-clk" id="clk">--:--</div>
  </div>
  <div class="srow">
    <button class="sb on" id="sh0" onclick="pickSh(0)">&#9728; Shift 1</button>
    <button class="sb" id="sh1" onclick="pickSh(1)">&#127748; Shift 2</button>
    <button class="sb" id="sh2" onclick="pickSh(2)">&#127769; Shift 3</button>
    <div class="sdt" id="sdt"></div>
  </div>
  <div class="sts">
    <div class="si"><div class="sl">Run</div><div class="sv cr" id="vr">0</div></div>
    <div class="si"><div class="sl">Stop</div><div class="sv cs" id="vs">32</div></div>
    <div class="si"><div class="sl">Maint</div><div class="sv cm" id="vm">0</div></div>
    <div class="si"><div class="sl">Uptime</div><div class="sv cu" id="vu">0%</div></div>
  </div>
  <div class="pb"><div class="pf" id="pf" style="width:0"></div></div>
  <div class="sync" id="sync"></div>
  <div class="board" id="board"></div>
  <div class="lgd">
    <div class="lgi"><div class="lgd-dot" style="background:#1D9E75"></div>Run</div>
    <div class="lgi"><div class="lgd-dot" style="background:#ddd"></div>Stop</div>
    <div class="lgi"><div class="lgd-dot" style="background:#d4880a"></div>Maint</div>
    <div class="lgd-r" id="updated"></div>
  </div>
  <div class="ftr">
    <button class="fb" onclick="doCopy()">&#128203; Copy</button>
    <button class="fb" onclick="doShare()">&#128228; Share</button>
    <button class="fb" onclick="doShareImg()">&#128247; Image</button>
    <button class="fb" onclick="doAdmin()" id="adminBtn">&#128274; Admin Save</button>
  </div>
</div>

<!-- Edit sheet -->
<div class="ov" id="ov" onclick="bgCl(event)">
  <div class="sh">
    <div class="drg"></div>
    <div class="mbg mbs" id="mbg">Stopped</div>
    <div class="mti" id="mti">A-1</div>
    <div class="msu" id="msu">Dong Shin &middot; 250 ton</div>

    <div id="repairView" style="display:none">
      <div class="mlbl">Current repair status</div>
      <div class="rview" id="repairViewText"></div>
    </div>

    <div class="mlbl">Status</div>
    <div class="mbtn3">
      <button class="mb" id="bR" onclick="pSt('run')"><svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>Run</button>
      <button class="mb" id="bS" onclick="pSt('stop')"><svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>Stop</button>
      <button class="mb" id="bM" onclick="pSt('maint')"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>Maint</button>
    </div>

    <div id="itemBlock" style="display:none">
      <div class="mlbl">Item / part being produced</div>
      <input type="text" class="ni" id="itemIn" placeholder="e.g. Bracket-LH 12345 / Door Hinge">
    </div>

    <div id="noteBlock">
      <div class="mlbl" id="noteLbl">Quick remarks</div>
      <div class="qr" id="qr"></div>
      <div class="mlbl">Notes</div>
      <textarea class="ni" id="nb" rows="2" placeholder="Die change, Oil leak, PM check..."></textarea>
    </div>

    <div id="repairBlock" style="display:none">
      <div class="mlbl">Repair action / progress</div>
      <textarea class="ni" id="rep" rows="3" placeholder="e.g. Hydraulic hose replaced 14:30, pressure test in progress, ETA 16:00..."></textarea>
    </div>

    <div class="mac">
      <button class="mcc" onclick="clSh()">Cancel</button>
      <button class="mok" onclick="savCard()">OK</button>
    </div>
  </div>
</div>

<!-- Password modal -->
<div class="pw-ov" id="pwov" onclick="bgPw(event)">
  <div class="pw-box">
    <div class="pw-title">&#128274; Admin Login</div>
    <div class="pw-sub">Enter password to save &amp; publish</div>
    <input type="password" class="pw-input" id="pwi" placeholder="****" maxlength="20" autocomplete="off">
    <div class="pw-err" id="pwerr">Wrong password</div>
    <div class="pw-btns">
      <button class="pw-cc" onclick="clPw()">Cancel</button>
      <button class="pw-ok" onclick="tryPw()">Login</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
/* ============================================================
   CONFIGURATION - 아래 두 곳만 수정하세요
   ============================================================ */

var FIREBASE_CONFIG = {
  apiKey: "AIzaSyBUa9MrF7WtRcGkAMTVI-TwsJIA9ramnR4",
  authDomain: "idas-tandem-press.firebaseapp.com",
  databaseURL: "https://idas-tandem-press-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "idas-tandem-press",
  storageBucket: "idas-tandem-press.firebasestorage.app",
  messagingSenderId: "513104641436",
  appId: "1:513104641436:web:511509ee27b608b9fa5c59"
};

var ADMIN_PW = 'idas2026';

/* ============================================================ */

var MC = [
  {n:'A-1',mk:'Dong Shin',t:250},{n:'A-2',mk:'Dong Shin',t:250},
  {n:'A-3',mk:'Dong Shin',t:250},{n:'A-4',mk:'Dong Shin',t:250},
  {n:'A-5',mk:'Dong Shin',t:250},{n:'A-6',mk:'Dong Shin',t:250},
  {n:'A-7',mk:'Dong Shin',t:250},{n:'A-8',mk:'Simpac',t:200},
  {n:'B-1',mk:'Dong Shin',t:250},{n:'B-2',mk:'Simpac',t:200},
  {n:'B-3',mk:'Simpac',t:200},{n:'B-4',mk:'Simpac',t:200},
  {n:'B-5',mk:'Simpac',t:150},{n:'B-6',mk:'Simpac',t:150},
  {n:'B-7',mk:'Simpac',t:150},{n:'B-8',mk:'JH',t:200},
  {n:'C-1',mk:'JH',t:250},{n:'C-2',mk:'JH',t:250},
  {n:'C-3',mk:'JH',t:200},{n:'C-4',mk:'JH',t:200},
  {n:'C-5',mk:'JH',t:200},{n:'C-6',mk:'JH',t:200},
  {n:'C-7',mk:'JH',t:200},{n:'C-8',mk:'JH',t:200},
  {n:'D-1',mk:'JH',t:250},{n:'D-2',mk:'JH',t:250},
  {n:'D-3',mk:'JH',t:200},{n:'D-4',mk:'JH',t:200},
  {n:'D-5',mk:'JH',t:200},{n:'D-6',mk:'JH',t:200},
  {n:'D-7',mk:'JH',t:200},{n:'D-8',mk:'JH',t:200}
];
var QN={run:['OK','Die changed','After repair','Trial'],stop:['No job','Material short','Die setup','Waiting','Break'],maint:['PM check','Oil leak','Die repair','Electrical','Hydraulic','Breakdown']};

var ST={}, SHIFT=0, CUR=-1, SEL='stop', ADMIN=false, DB=null, FB_OK=false;

/* ---- Firebase Init ---- */
function initFB(){
  try {
    if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
      showSync('Firebase not configured \u2014 using local mode','err');
      return;
    }
    firebase.initializeApp(FIREBASE_CONFIG);
    DB = firebase.database();
    FB_OK = true;

    DB.ref('status').on('value', function(snap){
      var d = snap.val();
      if (d) {
        if (d.st) { for (var k in d.st) ST[k] = d.st[k]; }
        if (typeof d.sh === 'number') { SHIFT = d.sh; setShUI(SHIFT); }
        buildBoard(); updateStats();
        if (d.ts) showUpdated(d.ts);
        showSync('Live \u2014 synced','ok');
      }
    }, function(err){
      showSync('Connection error','err');
      console.error(err);
    });
  } catch(e) {
    showSync('Firebase error: '+e.message,'err');
    console.error(e);
  }
}

function fbSave(){
  if (!FB_OK || !DB) {
    try { localStorage.setItem('das_local', JSON.stringify({st:ST,sh:SHIFT})); } catch(e){}
    toast('Saved locally (no Firebase)');
    return;
  }
  var now = new Date();
  var ts = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  DB.ref('status').set({st:ST, sh:SHIFT, ts:ts}).then(function(){
    toast('Published \u2714 All users updated');
  }).catch(function(e){
    toast('Save error: '+e.message);
  });
}

function showSync(msg,type){
  var el=document.getElementById('sync');
  el.textContent=msg;
  el.className='sync show'+(type==='err'?' err':'');
}
function showUpdated(ts){
  document.getElementById('updated').textContent='Updated: '+ts.slice(11,16);
}

/* ---- Init ---- */
function init(){
  for(var i=0;i<32;i++) ST[i]={s:'stop',note:'',item:'',repair:''};

  try{
    var raw=localStorage.getItem('das_local');
    if(raw){var d=JSON.parse(raw);if(d.st){for(var k in d.st){
      var e=d.st[k];
      ST[k]={s:e.s||'stop',note:e.note||'',item:e.item||'',repair:e.repair||''};
    }}if(typeof d.sh==='number')SHIFT=d.sh;}
  }catch(e){}

  setShUI(SHIFT);
  buildBoard();
  updateStats();
  tick();
  setInterval(tick,1000);
  initFB();
}

/* ---- Admin ---- */
function doAdmin(){
  if(ADMIN){
    fbSave();
    return;
  }
  document.getElementById('pwi').value='';
  document.getElementById('pwerr').style.display='none';
  document.getElementById('pwov').classList.add('open');
  setTimeout(function(){document.getElementById('pwi').focus();},200);
}
function tryPw(){
  var v=document.getElementById('pwi').value;
  if(v===ADMIN_PW){
    ADMIN=true;
    document.getElementById('pwov').classList.remove('open');
    document.getElementById('adminBtn').innerHTML='&#128275; Publish';
    document.getElementById('adminBtn').className='fb';
    document.getElementById('adminBtn').style.background='#1D9E75';
    document.getElementById('adminBtn').style.color='#fff';
    document.getElementById('adminBtn').style.borderColor='#1D9E75';
    toast('Admin mode \u2014 tap cards to edit, then Publish');
  } else {
    document.getElementById('pwerr').style.display='block';
    document.getElementById('pwi').value='';
    document.getElementById('pwi').focus();
  }
}
function clPw(){document.getElementById('pwov').classList.remove('open');}
function bgPw(e){if(e.target===document.getElementById('pwov'))clPw();}

/* ---- Shift ---- */
function pickSh(n){
  if(!ADMIN){toast('Admin login required');return;}
  SHIFT=n; setShUI(n);
}
function setShUI(n){
  for(var i=0;i<3;i++) document.getElementById('sh'+i).className='sb'+(i===n?' on':'');
}

/* ---- Board ---- */
function buildBoard(){
  var lines=['A','B','C','D'];
  var el=document.getElementById('board');
  el.innerHTML='';
  for(var li=0;li<lines.length;li++){
    var L=lines[li], items=[], rC=0, mC=0;
    for(var i=0;i<32;i++){if(MC[i].n[0]===L){items.push(i);if(ST[i].s==='run')rC++;if(ST[i].s==='maint')mC++;}}
    var sec=document.createElement('div');
    var hdr=document.createElement('div');hdr.className='lhdr';
    hdr.innerHTML='<span>'+L+' LINE</span><span class="lsub">'+rC+'/8 run'+(mC?' &middot; '+mC+' maint':'')+'</span>';
    sec.appendChild(hdr);
    var gr=document.createElement('div');gr.className='gr';
    for(var k=0;k<items.length;k++){
      (function(idx){
        var m=MC[idx],s=ST[idx].s;
        var cd=document.createElement('div');cd.className='cd '+s;cd.id='c'+idx;
        cd.innerHTML=cardInner(idx);
        cd.addEventListener('click',function(){ openSh(idx); });
        gr.appendChild(cd);
      })(items[k]);
    }
    sec.appendChild(gr);el.appendChild(sec);
  }
}

function esc(s){
  var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;
}

function cardInner(idx){
  var st=ST[idx], m=MC[idx];
  var extra='';
  if(st.s==='run' && st.item){
    extra='<div class="ci" title="'+esc(st.item)+'">'+esc(st.item)+'</div>';
  } else if(st.s==='maint'){
    extra='<div class="ci">'+(st.repair? 'tap for status':'no repair info')+'</div>';
  }
  return '<div class="dd"></div><div class="cn">'+m.n+'</div><div class="ct">'+m.t+'T</div>'+extra;
}

function refreshC(idx){
  var cd=document.getElementById('c'+idx);if(!cd)return;
  var s=ST[idx].s;
  cd.className='cd '+s;
  cd.innerHTML=cardInner(idx);
}

function updateStats(){
  var r=0,s=0,m=0;
  for(var i=0;i<32;i++){if(ST[i].s==='run')r++;else if(ST[i].s==='maint')m++;else s++;}
  document.getElementById('vr').textContent=r;
  document.getElementById('vs').textContent=s;
  document.getElementById('vm').textContent=m;
  var p=Math.round(r/32*100);
  document.getElementById('vu').textContent=p+'%';
  document.getElementById('pf').style.width=p+'%';
}

/* ---- Edit Sheet ---- */
function openSh(idx){
  CUR=idx;SEL=ST[idx].s;
  var m=MC[idx], st=ST[idx];
  document.getElementById('mti').textContent=m.n;
  document.getElementById('msu').textContent=m.mk+' \u00b7 '+m.t+' ton';
  document.getElementById('nb').value=st.note||'';
  document.getElementById('itemIn').value=st.item||'';
  document.getElementById('rep').value=st.repair||'';

  if(st.s==='maint' && st.repair){
    document.getElementById('repairView').style.display='block';
    document.getElementById('repairViewText').textContent=st.repair;
  } else {
    document.getElementById('repairView').style.display='none';
  }

  setBg(SEL);setBtn(SEL);bldQ(SEL,st.note||'');
  updateFieldVisibility(SEL);
  document.getElementById('ov').classList.add('open');
}
function setBg(s){
  var l={run:'Running',stop:'Stopped',maint:'Maintenance'};
  var c={run:'mbr',stop:'mbs',maint:'mbm'};
  var e=document.getElementById('mbg');e.textContent=l[s];e.className='mbg '+c[s];
}
function setBtn(s){
  document.getElementById('bR').className='mb'+(s==='run'?' xrun':'');
  document.getElementById('bS').className='mb'+(s==='stop'?' xstop':'');
  document.getElementById('bM').className='mb'+(s==='maint'?' xmaint':'');
}
function updateFieldVisibility(s){
  document.getElementById('itemBlock').style.display = (s==='run') ? 'block' : 'none';
  document.getElementById('repairBlock').style.display = (s==='maint') ? 'block' : 'none';
  document.getElementById('noteLbl').textContent = (s==='maint') ? 'Quick remarks (issue type)' : 'Quick remarks';
}
function bldQ(s,cur){
  var ch=QN[s]||[];var el=document.getElementById('qr');el.innerHTML='';
  for(var i=0;i<ch.length;i++){
    (function(c){
      var sp=document.createElement('span');sp.className='qc'+(cur===c?' pk':'');sp.textContent=c;
      sp.addEventListener('click',function(){
        document.getElementById('nb').value=c;
        var all=document.querySelectorAll('.qc');for(var j=0;j<all.length;j++)all[j].classList.remove('pk');
        sp.classList.add('pk');
      });
      el.appendChild(sp);
    })(ch[i]);
  }
}
function pSt(s){
  SEL=s;setBg(s);setBtn(s);bldQ(s,document.getElementById('nb').value);
  updateFieldVisibility(s);
}

function savCard(){
  if(CUR<0)return;
  ST[CUR].s=SEL;
  ST[CUR].note=document.getElementById('nb').value.trim();
  ST[CUR].item = (SEL==='run') ? document.getElementById('itemIn').value.trim() : ST[CUR].item;
  ST[CUR].repair = (SEL==='maint') ? document.getElementById('rep').value.trim() : ST[CUR].repair;
  refreshC(CUR);updateStats();clSh();
  var l={run:'Running',stop:'Stopped',maint:'Maintenance'};
  toast(MC[CUR].n+' \u2192 '+l[SEL]+' (tap Publish to save)');
}
function clSh(){document.getElementById('ov').classList.remove('open');CUR=-1;}
function bgCl(e){if(e.target===document.getElementById('ov'))clSh();}

/* ---- Actions ---- */
function buildRpt(){
  var r=0,s=0,m=0;
  for(var i=0;i<32;i++){if(ST[i].s==='run')r++;else if(ST[i].s==='maint')m++;else s++;}
  var now=new Date();
  var dt=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes());
  var sep='------------------------------';
  var txt='[DAS Tandem M/E Status]\n'+dt+' | Shift '+(SHIFT+1)+'\n'+sep+'\n';
  txt+='Running    : '+r+'\nStopped    : '+s+'\nMaintenance: '+m+'\nUptime     : '+Math.round(r/32*100)+'%\n';
  var iss=[];
  for(var i=0;i<32;i++){if(ST[i].s!=='stop'||ST[i].note)iss.push(i);}
  if(iss.length){
    txt+=sep+'\n';
    for(var j=0;j<iss.length;j++){
      var x=iss[j];var ic=ST[x].s==='run'?'[RUN]':ST[x].s==='maint'?'[MNT]':'[STP]';
      var extra='';
      if(ST[x].s==='run' && ST[x].item) extra=' | Item: '+ST[x].item;
      if(ST[x].s==='maint' && ST[x].repair) extra=' | Repair: '+ST[x].repair;
      txt+=ic+' '+(MC[x].n+'    ').slice(0,5)+MC[x].t+'T '+(ST[x].note||'')+extra+'\n';
    }
  }
  txt+=sep;return txt;
}
function doCopy(){
  var txt=buildRpt();
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){toast('Copied');}).catch(function(){fbCopy(txt);});
  } else fbCopy(txt);
}
function fbCopy(txt){
  var ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;top:-999px;opacity:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');toast('Copied');}catch(e){toast('Copy failed');}
  document.body.removeChild(ta);
}
function doShare(){
  if(navigator.share)navigator.share({title:'DAS M/E Status',text:buildRpt()}).catch(function(){});
  else doCopy();
}

function doShareImg(){
  var target=document.querySelector('.app');
  toast('Capturing...');
  html2canvas(target,{backgroundColor:'#ffffff',scale:2}).then(function(canvas){
    canvas.toBlob(function(blob){
      if(!blob){toast('Capture failed');return;}
      var now=new Date();
      var fname='das_status_'+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'_'+pad(now.getHours())+pad(now.getMinutes())+'.png';
      var file=new File([blob],fname,{type:'image/png'});
      if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'DAS M/E Status'}).catch(function(){});
      } else {
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a');a.href=url;a.download=fname;
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        setTimeout(function(){URL.revokeObjectURL(url);},2000);
        toast('Saved as image (share not supported)');
      }
    },'image/png');
  }).catch(function(e){
    toast('Capture error: '+e.message);
  });
}

/* ---- Utils ---- */
function pad(n){return('0'+n).slice(-2);}
function toast(msg){var e=document.getElementById('toast');e.textContent=msg;e.classList.add('on');setTimeout(function(){e.classList.remove('on');},2400);}
function tick(){
  var n=new Date();
  document.getElementById('clk').textContent=pad(n.getHours())+':'+pad(n.getMinutes());
  var d=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('sdt').textContent=d[n.getDay()]+' '+mo[n.getMonth()]+' '+n.getDate();
}
document.addEventListener('keydown',function(e){
  if(document.getElementById('pwov').classList.contains('open')&&e.key==='Enter')tryPw();
});

init();
</script>
